name: Deploy NLLB Translation Service

on:
  workflow_run:
    workflows: ["LoRA Training Workflow"]
    types: [ completed ]
  workflow_dispatch:

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download latest trained model
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p models

          echo $GITHUB_TOKEN | gh auth login --with-token

          latestTag=$(gh release list --limit 1 --json tagName --jq ".[0].tagName")

          if [ -n "$latestTag" ]; then
            echo "Latest release: $latestTag"
            gh release download "$latestTag" --pattern "model.tar.gz" --dir ./models --clobber
            tar -xzf ./models/model.tar.gz -C ./models
            rm ./models/model.tar.gz
          else
            echo "No release found."
            exit 1
          fi

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: docker build -t onkarnanavare/nllb-translation:latest .

      - name: Push Docker Image
        run: docker push onkarnanavare/nllb-translation:latest
