name: Deploy NLLB Translation Service

on:
  workflow_run:
    workflows: ["LoRA Training Workflow"]
    types: [ completed ]
  workflow_dispatch:

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ✅ Download latest model from GitHub Release
      - name: Download latest trained model
        uses: dsaltares/fetch-gh-release-asset@v1
        with:
          repo: ${{ github.repository }}
          version: latest
          file: model.tar.gz
          target: model.tar.gz

      - name: Extract model
        run: |
          mkdir -p models
          tar -xzf model.tar.gz -C ./models
          rm model.tar.gz

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: docker build -t onkarnanavare/nllb-translation:latest .

      - name: Push Docker Image
        run: docker push onkarnanavare/nllb-translation:latest
