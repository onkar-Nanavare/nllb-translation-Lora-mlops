name: LoRA Training Workflow

on:
  push:
    branches: [ main ]
    paths:
      - "data/**"
      - "configs/**"
      - "training/**"
  workflow_dispatch:

jobs:
  lora_training:
    runs-on: self-hosted
    timeout-minutes: 360

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Recreate venv (clean every run)
        shell: powershell
        run: |
          if (Test-Path "venv") {
            Remove-Item -Recurse -Force venv
          }
          python -m venv venv

      - name: Activate venv & Install dependencies
        shell: powershell
        run: |
          .\venv\Scripts\Activate.ps1
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-training.txt
          pip install peft==0.11.0

      - name: Verify tokenizer deps
        shell: powershell
        run: |
          .\venv\Scripts\Activate.ps1
          python -c "import sentencepiece, tokenizers; print('sentencepiece OK:', sentencepiece.__version__); print('tokenizers OK:', tokenizers.__version__)"

      - name: Download latest trained model (if exists)
        shell: powershell
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if (!(Test-Path "models")) {
            New-Item -ItemType Directory -Path models | Out-Null
          }

          try {
            gh release download --pattern "model.tar.gz" --dir ./models --clobber
            Write-Host "Previous model downloaded."
          } catch {
            Write-Host "No previous model found. Training from base model."
          }

      - name: Extract previous model (if exists)
        shell: powershell
        run: |
          if (Test-Path "./models/model.tar.gz") {
            tar -xzf ./models/model.tar.gz -C ./models
          }

      - name: Run LoRA Training (resume automatically)
        shell: powershell
        run: |
          .\venv\Scripts\Activate.ps1
          python training/train_lora.py `
            --data-file data/new_data.tsv `
            --glossary-file data/glossary.json `
            --output-dir models/custom-nllb-fast `
            --model-name facebook/nllb-200-distilled-600M `
            --source-lang eng_Latn `
            --target-lang hin_Deva `
            --config configs/training_config.yaml `
            --resume-from models/custom-nllb-fast

      - name: Zip trained model
        shell: powershell
        run: |
          tar -czf model.tar.gz models/custom-nllb-fast

      - name: Upload model to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: model-${{ github.run_number }}
          name: Model ${{ github.run_number }}
          body: Auto-trained LoRA model
          files: model.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
