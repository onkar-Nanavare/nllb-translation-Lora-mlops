name: LoRA Training Workflow

on:
  push:
    branches: [ main ]
    paths:
      - "data/**"
      - "configs/**"
      - "training/**"
  workflow_dispatch:

jobs:
  lora_training:
    runs-on: self-hosted
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Recreate venv
        shell: powershell
        run: |
          if (Test-Path "venv") { Remove-Item -Recurse -Force venv }
          python -m venv venv

      - name: Install dependencies
        shell: powershell
        run: |
          .\venv\Scripts\Activate.ps1
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ✅ Download latest release asset (if exists)
      - name: Download latest trained model (if exists)
        uses: dsaltares/fetch-gh-release-asset@v1
        with:
          repo: ${{ github.repository }}
          version: latest
          file: model.tar.gz
          target: model.tar.gz
        continue-on-error: true

      # ✅ Extract if downloaded
      - name: Extract model (if exists)
        shell: powershell
        run: |
          if (Test-Path "model.tar.gz") {
            if (!(Test-Path "models")) {
              New-Item -ItemType Directory -Path models | Out-Null
            }

            tar -xzf model.tar.gz -C ./models
            Remove-Item model.tar.gz
            Write-Host "Previous model extracted."
          } else {
            Write-Host "No previous model found. Training from base model."
          }

      - name: Debug models folder
        shell: powershell
        run: |
          if (Test-Path "models") {
            Write-Host "Models folder content:"
            Get-ChildItem -Recurse models
          }

      - name: Run LoRA Training
        shell: powershell
        run: |
          .\venv\Scripts\Activate.ps1
          python training/train_lora.py `
            --data-file data/new_data.tsv `
            --glossary-file data/glossary.json `
            --output-dir models/custom-nllb `
            --model-name facebook/nllb-200-distilled-600M `
            --source-lang eng_Latn `
            --target-lang hin_Deva `
            --config configs/training_config.yaml `
            --resume-from models/custom-nllb

      - name: Zip trained model
        shell: powershell
        run: |
          tar -czf model.tar.gz models/custom-nllb

      - name: Upload model to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: model-${{ github.run_number }}
          name: Model ${{ github.run_number }}
          body: Auto-trained LoRA model
          files: model.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
