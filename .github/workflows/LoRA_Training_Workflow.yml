name: LoRA Training Workflow

on:
  push:
    branches:
      - main
    paths:
      - "data/**"
      - "config/**"
      - "training/**"
  workflow_dispatch:

jobs:
  lora_training:
    runs-on: self-hosted
    timeout-minutes: 360

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache venv
        uses: actions/cache@v4
        with:
          path: venv
          key: venv-${{ hashFiles('requirements.txt', 'requirements-training.txt') }}

      - name: Create venv if not exists
        shell: powershell
        run: |
          if (!(Test-Path "venv")) {
            python -m venv venv
          }

      - name: Activate venv & Install dependencies
        shell: powershell
        run: |
          .\venv\Scripts\Activate.ps1
          pip install -r requirements.txt
          pip install -r requirements-training.txt
          pip install accelerate datasets transformers peft bitsandbytes sentencepiece protobuf

      #  Download previous model if exists
      - name: Download latest model (if exists)
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p models/custom-nllb/latest
          gh release download latest --pattern "model.tar.gz" --dir ./models

      - name: Extract previous model (if exists)
        continue-on-error: true
        run: |
          tar -xzf ./models/model.tar.gz -C ./models/custom-nllb/latest

      #  Train from previous model if exists, else base model
      - name: Run LoRA Training (incremental)
        shell: powershell
        run: |
          .\venv\Scripts\Activate.ps1

          if (Test-Path "models/custom-nllb/latest") {
            echo "Using previous trained model"
            $MODEL_PATH="models/custom-nllb/latest"
          } else {
            echo "Using base model"
            $MODEL_PATH="facebook/nllb-200-distilled-600M"
          }

          python training/train_lora.py `
            --data-file data/new_data.tsv `
            --glossary-file data/glossary.json `
            --output-dir models/custom-nllb/latest `
            --model-name $MODEL_PATH `
            --source-lang eng_Latn `
            --target-lang hin_Deva `
            --config configs/training_config.yaml

      - name: Zip trained model
        run: |
          tar -czf model.tar.gz models/custom-nllb/latest

      - name: Upload model to GitHub Release (latest + versioned)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: model-${{ github.run_number }}
          name: Model ${{ github.run_number }}
          body: Incrementally fine-tuned LoRA model
          files: model.tar.gz
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
